<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiro Reverse Proxy</title>
  <link rel="icon" type="image/x-icon" href="/admin/favicon.ico" />
  <script>
    (function () {
      try {
        var pref = localStorage.getItem('kiro_theme') || 'system';
        var dark = pref === 'dark' || (pref !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
        document.documentElement.dataset.themePref = pref;
      } catch (e) { }
      window.__adminStylesReady = function () {
        document.documentElement.classList.add('admin-css-ready');
      };
      setTimeout(window.__adminStylesReady, 1800);
    })();
  </script>
  <style>
    :root {
      --background: #fcfcfc;
      --foreground: #000000;
      color-scheme: light;
    }

    .dark {
      --background: #000000;
      --foreground: #ffffff;
      color-scheme: dark;
    }

    html,
    body {
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      min-height: 100%;
    }

    html:not(.admin-css-ready) body {
      visibility: hidden;
    }

    .hidden {
      display: none !important;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700;800;900&family=Geist+Mono:wght@100;200;300;400;500;600;700;800;900&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700;800;900&family=Geist+Mono:wght@100;200;300;400;500;600;700;800;900&display=swap" />
  </noscript>
  <link rel="stylesheet" href="/admin/vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="/admin/styles.css" onload="window.__adminStylesReady && window.__adminStylesReady()"
    onerror="window.__adminStylesReady && window.__adminStylesReady()" />
  <link rel="stylesheet" href="/admin/toast.css" />
  <script src="/admin/vendor/tailwindcss-browser/index.global.js"></script>
</head>

<body>
  <div id="loginPage" class="login-wrapper">
    <div class="ghost-bg" aria-hidden="true">
      <i class="fa-solid fa-ghost ghost ghost-1"></i>
      <i class="fa-solid fa-ghost ghost ghost-2"></i>
      <i class="fa-solid fa-ghost ghost ghost-3"></i>
      <i class="fa-solid fa-ghost ghost ghost-4"></i>
      <i class="fa-solid fa-ghost ghost ghost-5"></i>
      <i class="fa-solid fa-ghost ghost ghost-6"></i>
      <i class="fa-solid fa-ghost ghost ghost-7"></i>
      <i class="fa-solid fa-ghost ghost ghost-8"></i>
      <i class="fa-solid fa-ghost ghost ghost-9"></i>
      <i class="fa-solid fa-ghost ghost ghost-10"></i>
      <i class="fa-solid fa-ghost ghost ghost-11"></i>
      <i class="fa-solid fa-ghost ghost ghost-12"></i>
    </div>
    <header class="login-topbar">
      <div class="login-topbar-inner">
        <div class="brand" aria-label="Kiro Reverse Proxy" data-i18n-aria-label="app.title">
          <img class="brand-icon" src="/admin/favicon.ico" alt="" />
          <span class="brand-text">Kiro Reverse Proxy</span>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn lang-toggle" id="loginLangSwitch" type="button" aria-label=""
            data-i18n-title="lang.label" data-i18n-aria-label="lang.label">
            <span class="lang-toggle-label"></span>
          </button>
          <span class="divider" aria-hidden="true"></span>
          <button id="loginThemeToggle" class="icon-btn theme-toggle" type="button" aria-label=""
            data-i18n-title="theme.toggle" data-i18n-aria-label="theme.toggle" data-theme="system">
            <i class="fa-solid fa-circle-half-stroke theme-ico-system"></i>
            <i class="fa-solid fa-sun theme-ico-light"></i>
            <i class="fa-solid fa-moon theme-ico-dark"></i>
          </button>
        </div>
      </div>
    </header>
    <main class="login-main">
      <div class="login-box">
        <h1 class="login-title" data-i18n="login.title"></h1>
        <p class="login-subtitle" data-i18n="login.subtitle"></p>
        <div class="form-group">
          <label data-i18n="login.password"></label>
          <div class="input-affix">
            <i class="fa-solid fa-lock affix-icon"></i>
            <input type="password" id="pwdField" data-i18n-placeholder="login.passwordPlaceholder" autocomplete="off" />
            <button type="button" class="affix-btn" id="pwdToggle" aria-label=""
              data-i18n-aria-label="login.showPassword" data-shown="false">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <label class="remember-row" for="rememberPwd">
          <input type="checkbox" id="rememberPwd" />
          <span class="remember-box" aria-hidden="true"><i class="fa-solid fa-check"></i></span>
          <span class="remember-label" data-i18n="login.remember"></span>
        </label>
        <button type="button" class="btn btn-primary btn-lg w-full" id="loginBtn">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          <span data-i18n="login.submit"></span>
        </button>
        <div class="login-meta">
          <div class="login-meta-row">
            <span class="login-chip"><i class="fa-solid fa-plug"></i><span data-i18n="login.compatOpenAI"></span></span>
            <span class="login-chip"><i class="fa-solid fa-plug"></i><span
                data-i18n="login.compatAnthropic"></span></span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="mainPage" class="hidden">

          <div class="brand">

          <div class="tabs" id="tabBar">

            <button type="button" class="tab" data-tab="settings"><i class="fa-solid fa-sliders tab-icon"></i><span

            <button type="button" class="tab" data-tab="api"><i class="fa-solid fa-plug tab-icon"></i><span
                data-i18n="tabs.api"></span></button>
          </div>
        </nav>
        <div class="topbar-actions flex-wrap justify-end">
          <button class="icon-btn lang-toggle" id="mainLangSwitch" type="button" aria-label=""
            data-i18n-title="lang.label" data-i18n-aria-label="lang.label">
            <span class="lang-toggle-label"></span>
          </button>
          <button id="mainThemeToggle" class="icon-btn theme-toggle" type="button" aria-label=""
            data-i18n-title="theme.toggle" data-i18n-aria-label="theme.toggle" data-theme="system">
            <i class="fa-solid fa-circle-half-stroke theme-ico-system"></i>
            <i class="fa-solid fa-sun theme-ico-light"></i>
            <i class="fa-solid fa-moon theme-ico-dark"></i>
          </button>
          <span class="divider" aria-hidden="true"></span>
          <button class="btn btn-outline btn-sm" id="logoutBtn" data-i18n-title="common.logout"

            <i class="fa-solid fa-right-from-bracket"></i>
            <span data-i18n="common.logout"></span>
          </button>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="stats-grid">

          </div>
          <div class="stat-metrics">
            <div class="stat-metric"><span class="stat-metric-value" id="statAvailable">0 / 0</span><span

            <div class="stat-metric"><span class="stat-metric-value" id="statCapacityPct">0%</span><span
                class="stat-metric-label" data-i18n="stats.capacityUsed"></span></div>
            <div class="stat-metric stat-metric-wide"><span class="stat-metric-value" id="statCredits">0 / 0</span><span
                class="stat-metric-label" data-i18n="stats.accountCredits"></span></div>
            <div class="stat-metric"><span class="stat-metric-value" id="statOtherCredits">0.0</span><span
                class="stat-metric-label" data-i18n="stats.otherCredits"></span></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.requests"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statRequests">0</div>
            </div>
            <i class="fa-solid fa-route stat-icon" aria-hidden="true"></i>
          </div>
          <div class="stat-metrics">
            <div class="stat-metric"><span class="stat-metric-value" id="statTokens">0</span><span
                class="stat-metric-label" data-i18n="stats.tokens"></span></div>
            <div class="stat-metric"><span class="stat-metric-value" id="statAppCredits">0.0</span><span
                class="stat-metric-label" data-i18n="stats.appCredits"></span></div>
            <div class="stat-metric"><span class="stat-metric-value" id="statAvgTokens">0</span><span
                class="stat-metric-label" data-i18n="stats.avgTokens"></span></div>
            <div class="stat-metric"><span class="stat-metric-value" id="statAvgCredits">0.0</span><span
                class="stat-metric-label" data-i18n="stats.avgCredits"></span></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.success"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statSuccess">0</div>
            </div>
            <i class="fa-solid fa-circle-check stat-icon" aria-hidden="true"></i>
          </div>
          <div class="stat-metrics stat-metrics-compact">
            <div class="stat-metric"><span class="stat-metric-value" id="statSuccessRate">0%</span><span
                class="stat-metric-label" data-i18n="stats.successRate"></span></div>
            <div class="stat-metric"><span class="stat-metric-value" id="statSuccessRatio">0 / 0</span><span
                class="stat-metric-label" data-i18n="stats.completed"></span></div>
            <div class="stat-metric"><span class="stat-metric-value" id="statSuccessInTokens">0</span><span
                class="stat-metric-label" data-i18n="stats.inputTokens"></span></div>
            <div class="stat-metric"><span class="stat-metric-value" id="statSuccessOutTokens">0</span><span
                class="stat-metric-label" data-i18n="stats.outputTokens"></span></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.failed"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value stat-value--danger" id="statFailed">0</div>
            </div>
            <i class="fa-solid fa-circle-xmark stat-icon stat-icon--danger" aria-hidden="true"></i>
          </div>
          <div class="stat-metrics">
            <div class="stat-metric"><span class="stat-metric-value stat-metric-value--danger"
                id="statFailedRate">0%</span><span class="stat-metric-label" data-i18n="stats.failedRate"></span></div>
            <div class="stat-metric"><span class="stat-metric-value" id="statErrorEvents">0</span><span
                class="stat-metric-label" data-i18n="stats.errorEvents"></span></div>
            <div class="stat-metric"><span class="stat-metric-value" id="statExhausted">0</span><span
                class="stat-metric-label" data-i18n="stats.exhausted"></span></div>
            <div class="stat-metric"><span class="stat-metric-value" id="statUnavailable">0</span><span
                class="stat-metric-label" data-i18n="stats.unavailable"></span></div>
          </div>
        </div>
      </div>

      <div id="tabAccounts" class="tab-content">

          <div class="card-header">

            <div class="card-actions">
              <label class="flex items-center gap-2 cursor-pointer select-none" title=""

                <span class="text-xs font-medium" data-i18n="privacy.label"></span>
                <span class="switch"><input type="checkbox" id="privacyModeToggle" checked /><span
                    class="slider"></span></span>
              </label>
              <button class="btn btn-outline btn-sm" id="exportBtn"><i class="fa-solid fa-file-export"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="accounts.export"></span></button>
              <button class="btn btn-outline btn-sm" id="refreshAllModelsBtn"><i class="fa-solid fa-arrows-rotate"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="models.refreshAll"></span></button>
              <button class="btn btn-primary btn-sm" id="addAccountBtn"><i class="fa-solid fa-plus"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="accounts.add"></span></button>
            </div>
          </div>

          <div class="toolbar">
            <label class="flex items-center gap-1.5 cursor-pointer select-none shrink-0">
              <input type="checkbox" id="selectAllCheckbox" />
              <span class="text-xs" data-i18n="batch.selectAll"></span>
            </label>
            <div id="batchBar" class="batch-bar hidden">
              <span id="batchCount" class="batch-count"></span>
              <button class="btn btn-primary btn-xs" data-batch="enable" data-i18n="batch.enable"></button>
              <button class="btn btn-secondary btn-xs" data-batch="disable" data-i18n="batch.disable"></button>
              <button class="btn btn-secondary btn-xs" data-batch="refresh" data-i18n="batch.refresh"></button>
              <button class="btn btn-secondary btn-xs" data-batch="refreshModels"
                data-i18n="batch.refreshModels"></button>
              <button class="btn btn-danger btn-xs" data-batch="delete" data-i18n="batch.delete"></button>
            </div>
            <div class="toolbar-spacer"></div>
            <input type="text" id="filterSearch" class="w-56!" data-i18n-placeholder="filter.search" />
            <select id="filterStatusSelect" class="w-32!" data-i18n-aria-label="filter.status">
              <option value="all" data-i18n="filter.all"></option>
              <option value="enabled" data-i18n="filter.enabled"></option>
              <option value="disabled" data-i18n="filter.disabled"></option>
              <option value="banned" data-i18n="filter.banned"></option>
            </select>
          </div>

          <div id="accountsList"></div>
        </div>
      </div>

      <div id="tabObserve" class="tab-content hidden">
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="observe.title"></span>
            <div class="card-actions">
              <span class="badge badge-info" id="observeLiveBadge" data-i18n="observe.live"></span>
              <button class="btn btn-outline btn-sm" id="refreshObserveBtn" type="button"><i
                  class="fa-solid fa-arrows-rotate"></i><span class="btn-text"
                  data-i18n="common.refresh"></span></button>
            </div>
          </div>
          <div class="feature-stats-grid" id="observeSummary"></div>
          <div class="panel-split observe-panels">
            <section class="observe-panel">
              <div class="observe-panel-head">
                <div class="panel-section-title" data-i18n="observe.heatmap"></div>
                <span class="observe-panel-note" data-i18n="observe.last60"></span>
              </div>
              <div id="observeHeatmap" class="heatmap-wrap"></div>
            </section>
            <section class="observe-panel">
              <div class="observe-panel-head">
                <div class="panel-section-title" data-i18n="observe.modelMix"></div>
                <span class="observe-panel-note" data-i18n="observe.byModel"></span>
              </div>
              <div id="observeModelMix" class="table-wrap"></div>
            </section>
          </div>
          <div class="panel-section-title" data-i18n="observe.errors"></div>
          <div id="observeErrors" class="table-wrap"></div>
        </div>
      </div>

      <div id="tabRequests" class="tab-content hidden">
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="requests.title"></span>
            <div class="card-actions">
              <button class="btn btn-outline btn-sm" id="refreshRequestsBtn" type="button"><i
                  class="fa-solid fa-arrows-rotate"></i><span class="btn-text"
                  data-i18n="common.refresh"></span></button>
            </div>
          </div>
          <div class="requests-toolbar">
            <div class="requests-search">
              <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
              <input type="search" id="requestSearchInput" data-i18n-placeholder="requests.searchPlaceholder"
                data-i18n-aria-label="requests.search" />
            </div>
            <select id="requestStatusFilter" data-i18n-aria-label="requests.statusFilter">
              <option value="" data-i18n="requests.allStatuses"></option>
              <option value="success" data-i18n="requests.ok"></option>
              <option value="failed" data-i18n="requests.fail"></option>
            </select>
            <select id="requestPageSize" data-i18n-aria-label="requests.pageSize">
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
          <div id="requestsTable" class="table-wrap"></div>
          <div class="table-pagination">
            <span id="requestsPageInfo" class="table-page-info"></span>
            <div class="table-page-actions">
              <button class="btn btn-outline btn-sm" id="requestsPrevBtn" type="button"
                data-i18n="requests.prev"></button>
              <button class="btn btn-outline btn-sm" id="requestsNextBtn" type="button"
                data-i18n="requests.next"></button>
            </div>
          </div>
        </div>
      </div>

      <div id="tabSettings" class="tab-content hidden">
        <div class="card api-settings-card">
          <div class="card-header">
            <span class="card-title" data-i18n="settings.apiSettings"></span>
            <button class="btn btn-outline btn-sm" id="refreshApiKeysBtn" type="button">
              <i class="fa-solid fa-arrows-rotate"></i><span class="btn-text" data-i18n="common.refresh"></span>
            </button>
          </div>
          <div class="api-access-row">
            <label class="api-access-toggle">
              <span class="switch"><input type="checkbox" id="requireApiKey" /><span class="slider"></span></span>
              <span data-i18n="settings.enableApiKey"></span>
            </label>
            <button class="btn btn-primary" id="saveApiSettingsBtn" data-i18n="settings.saveApiKey"></button>
          </div>
          <div id="apiKeyManagement" class="api-key-management hidden">
            <div id="createdApiKeyPanel" class="message message-success api-key-created-panel hidden">
              <span class="api-key-created-label" data-i18n="settings.createdApiKey"></span>
              <div class="api-key-created-value">
                <code class="code-inline" id="createdApiKeyValue"></code>
                <button class="btn btn-outline btn-icon btn-sm" id="copyCreatedApiKeyBtn" type="button"
                  data-i18n-title="common.copy" data-i18n-aria-label="common.copy">
                  <i class="fa-solid fa-copy" aria-hidden="true"></i>
                </button>
              </div>
            </div>
            <div class="api-key-create-grid">
              <div class="form-group api-key-name-field">
                <label data-i18n="settings.apiKeyName"></label>
                <input type="text" id="newApiKeyName" data-i18n-placeholder="settings.apiKeyNamePlaceholder" />
              </div>
              <div class="form-group api-key-token-field">
                <label data-i18n="settings.apiKeyTokenLimit"></label>
                <input type="number" id="newApiKeyTokenLimit" min="0" step="1" value="0" />
              </div>
              <div class="form-group api-key-credit-field">
                <label data-i18n="settings.apiKeyCreditLimit"></label>
                <input type="number" id="newApiKeyCreditLimit" min="0" step="0.01" value="0" />
              </div>
              <div class="form-group api-key-custom-field">
                <label data-i18n="settings.apiKeyCustomValue"></label>
                <input type="text" id="newApiKeyValue" autocomplete="off" autocapitalize="off" spellcheck="false"
                  data-i18n-placeholder="settings.apiKeyCustomValuePlaceholder" />
              </div>
              <button class="btn btn-primary" id="createApiKeyBtn" type="button" data-i18n="settings.createApiKey"></button>
              <button class="btn btn-outline hidden" id="cancelApiKeyEditBtn" type="button" data-i18n="common.cancel"></button>
            </div>
            <div id="apiKeysList" class="table-wrap"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.usageSettings"></span></div>
          <div class="form-group">
            <label class="flex items-center gap-2">
              <span class="switch"><input type="checkbox" id="allowOverUsage" /><span class="slider"></span></span>
              <span data-i18n="settings.allowOverUsage"></span>
            </label>
            <small data-i18n="settings.allowOverUsageHint"></small>
          </div>
          <button class="btn btn-primary" id="saveOverUsageBtn" data-i18n="settings.saveUsage"></button>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.thinkingSettings"></span></div>
          <div class="form-group">
            <label data-i18n="settings.thinkingSuffix"></label>
            <input type="text" id="thinkingSuffix" placeholder="-thinking" />
            <small data-i18n="settings.thinkingSuffixHint"></small>
          </div>
          <div class="form-group">
            <label data-i18n="settings.openaiFormat"></label>
            <select id="openaiThinkingFormat">
              <option value="reasoning_content" data-i18n="settings.formatReasoningContent"></option>
              <option value="thinking" data-i18n="settings.formatThinkingClaude"></option>
              <option value="think" data-i18n="settings.formatThinkOpenAI"></option>
            </select>
          </div>
          <div class="form-group">
            <label data-i18n="settings.claudeFormat"></label>
            <select id="claudeThinkingFormat">
              <option value="thinking" data-i18n="settings.formatThinkingClaude"></option>
              <option value="think" data-i18n="settings.formatThinkOpenAI"></option>
            </select>
          </div>
          <button class="btn btn-primary" id="saveThinkingBtn" data-i18n="settings.saveThinking"></button>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.endpointSettings"></span></div>
          <div class="form-group">
            <label data-i18n="settings.preferredEndpoint"></label>
            <select id="preferredEndpoint">
              <option value="auto" data-i18n="settings.endpointAuto"></option>
              <option value="kiro" data-i18n="settings.endpointKiro"></option>
              <option value="codewhisperer" data-i18n="settings.endpointCodeWhisperer"></option>
              <option value="amazonq" data-i18n="settings.endpointAmazonQ"></option>
            </select>
            <small data-i18n="settings.endpointHint"></small>
          </div>
          <div class="form-group">
            <label class="flex items-center gap-2">
              <span class="switch"><input type="checkbox" id="endpointFallback" checked /><span
                  class="slider"></span></span>
              <span data-i18n="settings.endpointFallback"></span>
            </label>
            <small data-i18n="settings.endpointFallbackHint"></small>
          </div>
          <button class="btn btn-primary" id="saveEndpointBtn" data-i18n="settings.saveEndpoint"></button>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.adminPassword"></span></div>
          <div class="form-group">
            <label data-i18n="settings.newPassword"></label>
            <input type="password" id="newPassword" data-i18n-placeholder="settings.newPasswordPlaceholder" />
          </div>
          <button class="btn btn-primary" id="changePasswordBtn" data-i18n="settings.changePassword"></button>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.proxySettings"></span></div>
          <div class="form-group">
            <label data-i18n="settings.proxyType"></label>
            <select id="proxyType">
              <option value="none" data-i18n="settings.proxyNone"></option>
              <option value="socks5" data-i18n="settings.proxySocks5"></option>
              <option value="http" data-i18n="settings.proxyHttp"></option>
            </select>
          </div>
          <div id="proxyFields" class="hidden">
            <div class="form-group">
              <label data-i18n="settings.proxyHost"></label>
              <div class="input-row">
                <input type="text" id="proxyHost" placeholder="127.0.0.1" />
                <input type="number" id="proxyPort" class="w-24!" placeholder="1080" min="1" max="65535" />
              </div>
            </div>
            <div class="form-group">
              <label data-i18n="settings.proxyAuth"></label>
              <div class="input-row">
                <input type="text" id="proxyUsername" data-i18n-placeholder="settings.proxyUsername"
                  autocomplete="off" />
                <input type="password" id="proxyPassword" data-i18n-placeholder="settings.proxyPassword"
                  autocomplete="new-password" />
              </div>
            </div>
          </div>
          <button class="btn btn-primary" id="saveProxyBtn" data-i18n="settings.saveProxy"></button>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.promptFilter"></span></div>
          <div class="form-group">
            <label class="font-semibold pb-2 block" data-i18n="settings.builtinFilters"></label>
            <div class="flex flex-col gap-3">
              <div>
                <label class="flex items-center gap-2">
                  <span class="switch"><input type="checkbox" id="filterClaudeCode" /><span
                      class="slider"></span></span>
                  <span data-i18n="settings.filterClaudeCode"></span>
                </label>
                <small class="field-hint-offset" data-i18n="settings.filterClaudeCodeHint"></small>
              </div>
              <div>
                <label class="flex items-center gap-2">
                  <span class="switch"><input type="checkbox" id="filterEnvNoise" /><span class="slider"></span></span>
                  <span data-i18n="settings.filterEnvNoise"></span>
                </label>
                <small class="field-hint-offset" data-i18n="settings.filterEnvNoiseHint"></small>
              </div>
              <div>
                <label class="flex items-center gap-2">
                  <span class="switch"><input type="checkbox" id="filterStripBoundaries" /><span
                      class="slider"></span></span>
                  <span data-i18n="settings.filterStripBoundaries"></span>
                </label>
                <small class="field-hint-offset" data-i18n="settings.filterStripBoundariesHint"></small>
              </div>
            </div>
          </div>
          <div class="form-group mt-4">
            <label class="font-semibold pb-2 block" data-i18n="settings.customRules"></label>
            <div id="promptFilterRules" class="mb-2"></div>
            <div class="flex gap-2 flex-wrap items-center">
              <button class="btn btn-outline btn-sm" id="addRuleRegexBtn" data-i18n="promptFilter.addRegex"></button>
              <button class="btn btn-outline btn-sm" id="addRuleContainsBtn"
                data-i18n="promptFilter.addContains"></button>
              <button class="btn btn-primary btn-sm" id="savePromptFilterBtn"
                data-i18n="settings.savePromptFilter"></button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title" data-i18n="settings.statistics"></span></div>
          <button class="btn btn-danger" id="resetStatsBtn" data-i18n="settings.resetStats"></button>
        </div>
      </div>

      <div id="tabApi" class="tab-content hidden">
        <section class="api-card" aria-labelledby="apiEndpointsTitle">
          <div class="card-header api-card-header">
            <span class="card-title" id="apiEndpointsTitle" data-i18n="api.endpoints"></span>
            <span class="api-pill" data-i18n="api.protocolHttp"></span>
          </div>
          <div class="api-endpoint-list">
            <section class="api-endpoint-item">
              <div class="api-endpoint-meta">
                <span class="api-endpoint-icon"><i class="fa-solid fa-message"></i></span>
                <div>
                  <p class="api-endpoint-title" data-i18n="api.claude"></p>
                  <p class="api-endpoint-method" data-i18n="api.methodPost"></p>
                </div>
              </div>
              <div class="endpoint api-code-row"><span class="api-code" id="claudeEndpoint"></span><button
                  class="api-copy-btn" type="button" data-copy="claudeEndpoint" aria-label=""
                  data-i18n-aria-label="api.copyClaude"><i class="fa-regular fa-copy"></i></button></div>
            </section>
            <section class="api-endpoint-item">
              <div class="api-endpoint-meta">
                <span class="api-endpoint-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></span>
                <div>
                  <p class="api-endpoint-title" data-i18n="api.openai"></p>
                  <p class="api-endpoint-method" data-i18n="api.methodPost"></p>
                </div>
              </div>
              <div class="endpoint api-code-row"><span class="api-code" id="openaiEndpoint"></span><button
                  class="api-copy-btn" type="button" data-copy="openaiEndpoint" aria-label=""
                  data-i18n-aria-label="api.copyOpenAI"><i class="fa-regular fa-copy"></i></button></div>
            </section>
            <section class="api-endpoint-item">
              <div class="api-endpoint-meta">
                <span class="api-endpoint-icon"><i class="fa-solid fa-bolt"></i></span>
                <div>
                  <p class="api-endpoint-title" data-i18n="api.responses"></p>
                  <p class="api-endpoint-method" data-i18n="api.methodPost"></p>
                </div>
              </div>
              <div class="endpoint api-code-row"><span class="api-code" id="responsesEndpoint"></span><button
                  class="api-copy-btn" type="button" data-copy="responsesEndpoint" aria-label=""
                  data-i18n-aria-label="api.copyResponses"><i class="fa-regular fa-copy"></i></button></div>
            </section>
            <section class="api-endpoint-item">
              <div class="api-endpoint-meta">
                <span class="api-endpoint-icon"><i class="fa-solid fa-layer-group"></i></span>
                <div>
                  <p class="api-endpoint-title" data-i18n="api.modelList"></p>
                  <p class="api-endpoint-method" data-i18n="api.methodGet"></p>
                </div>
              </div>
              <div class="endpoint api-code-row"><span class="api-code" id="modelsEndpoint"></span><button
                  class="api-copy-btn" type="button" data-copy="modelsEndpoint" aria-label=""
                  data-i18n-aria-label="api.copyModels"><i class="fa-regular fa-copy"></i></button></div>
            </section>
            <section class="api-endpoint-item">
              <div class="api-endpoint-meta">
                <span class="api-endpoint-icon"><i class="fa-solid fa-code"></i></span>
                <div>
                  <p class="api-endpoint-title" data-i18n="api.codexModelManifest"></p>
                  <p class="api-endpoint-method" data-i18n="api.methodGet"></p>
                </div>
              </div>
              <div class="endpoint api-code-row"><span class="api-code" id="codexModelsEndpoint"></span><button
                  class="api-copy-btn" type="button" data-copy="codexModelsEndpoint" aria-label=""
                  data-i18n-aria-label="api.copyCodexModels"><i class="fa-regular fa-copy"></i></button></div>
            </section>
            <section class="api-endpoint-item">
              <div class="api-endpoint-meta">
                <span class="api-endpoint-icon"><i class="fa-solid fa-chart-simple"></i></span>
                <div>
                  <p class="api-endpoint-title" data-i18n="api.stats"></p>
                  <p class="api-endpoint-method" data-i18n="api.methodGet"></p>
                </div>
              </div>
              <div class="endpoint api-code-row"><span class="api-code" id="statsEndpoint"></span><button
                  class="api-copy-btn" type="button" data-copy="statsEndpoint" aria-label=""
                  data-i18n-aria-label="api.copyStats"><i class="fa-regular fa-copy"></i></button></div>
            </section>
          </div>
          <p class="api-hint"><i class="fa-solid fa-key"></i><span data-i18n="api.statsHint"></span></p>
        </section>
      </div>

      <div id="tabBackups" class="tab-content hidden">
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="backups.title"></span>
            <div class="card-actions">
              <input type="file" id="backupUploadInput" class="file-input-hidden" accept="application/json,.json" />
              <button class="btn btn-outline btn-sm" id="uploadBackupBtn" type="button"><i
                  class="fa-solid fa-file-import"></i><span class="btn-text" data-i18n="backups.upload"></span></button>
              <button class="btn btn-outline btn-sm" id="refreshBackupsBtn" type="button"><i
                  class="fa-solid fa-arrows-rotate"></i><span class="btn-text"
                  data-i18n="common.refresh"></span></button>
              <button class="btn btn-primary btn-sm" id="createBackupBtn" type="button"><i
                  class="fa-solid fa-plus"></i><span class="btn-text" data-i18n="backups.create"></span></button>
            </div>
          </div>
          <div class="settings-inline-grid backup-schedule-grid">
            <label class="backup-schedule-toggle">
              <span class="switch"><input type="checkbox" id="backupScheduleEnabled" /><span
                  class="slider"></span></span>
              <span data-i18n="backups.scheduleEnabled"></span>
            </label>
            <div class="backup-schedule-field">
              <label class="backup-field-label" for="backupCadence" data-i18n="backups.cadence"></label>
              <select id="backupCadence" data-i18n-aria-label="backups.cadence">
                <option value="hourly" data-i18n="backups.hourly"></option>
                <option value="daily" data-i18n="backups.daily"></option>
                <option value="weekly" data-i18n="backups.weekly"></option>
              </select>
            </div>
            <div class="backup-schedule-field backup-keep-field">
              <label class="backup-field-label" for="backupKeep" data-i18n="backups.keepLatest"></label>
              <div class="backup-keep-control">
                <input type="number" id="backupKeep" min="1" max="200" value="20"
                  data-i18n-aria-label="backups.keepLatest" />
                <span class="backup-keep-unit" data-i18n="backups.backupsUnit"></span>
              </div>
            </div>
            <button class="btn btn-primary" id="saveBackupScheduleBtn" type="button"
              data-i18n="backups.saveSchedule"></button>
          </div>
          <div id="backupsTable" class="table-wrap mt-4"></div>
        </div>
      </div>

    </div>

    <footer class="app-footer" aria-label="" data-i18n-aria-label="aria.footer">
      <div class="app-footer-inner">
        <div class="footer-panel">

            <div class="footer-copy">
              <div class="footer-title-row">
                <span class="footer-title">Kiro Reverse Proxy</span>
                <span class="footer-version" id="versionBadge" aria-label=""
                  data-i18n-aria-label="aria.currentVersion"></span>
                <span class="footer-version-status" id="statusBadge" data-i18n-title="status.running" title="">
                  <span class="status-dot"></span>
                </span>
              </div>
              <p class="footer-description" data-i18n="login.tagline"></p>
            </div>
          </div>
          <div class="footer-actions">
            <nav class="footer-links" aria-label="" data-i18n-aria-label="aria.resources">
              <button class="footer-link" id="checkUpdateBtn" type="button">
                <i class="fa-solid fa-rotate" aria-hidden="true"></i>
                <span data-i18n="update.check" data-update-label></span>
              </button>
              <a class="footer-link" href="https://github.com/tanu360/kiro-reverse-api" target="_blank" rel="noopener">
                <i class="fa-brands fa-github" aria-hidden="true"></i>
                <span data-i18n="footer.github"></span>
              </a>
            </nav>
          </div>
        </div>
        <div class="footer-meta">

        </div>

      <div class="modal-header"><span class="modal-title" id="modalTitle"></span><button class="modal-close"
          id="addModalClose" type="button" aria-label="" data-i18n-aria-label="common.close">&times;</button></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header"><span class="modal-title" data-i18n="detail.title"></span><button class="modal-close"
          id="detailModalClose" type="button" aria-label="" data-i18n-aria-label="common.close">&times;</button></div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>
  <div id="exportModal" class="modal">
    <div class="modal-content">
      <div class="modal-header"><span class="modal-title" data-i18n="export.title"></span><button class="modal-close"
          id="exportModalClose" type="button" aria-label="" data-i18n-aria-label="common.close">&times;</button></div>
      <div class="modal-body" id="exportBody"></div>
    </div>
  </div>
  <div id="testModal" class="modal">
    <div class="modal-content test-modal-content">
      <div class="modal-header"><span class="modal-title" data-i18n="accounts.testModalTitle"></span><button
          class="modal-close" id="testModalClose" type="button" aria-label=""
          data-i18n-aria-label="common.close">&times;</button></div>
      <div class="modal-body" id="testBody"></div>
    </div>
  </div>
  <div id="updateModal" class="modal">
    <div class="modal-content">
      <div class="modal-header"><span class="modal-title" data-i18n="update.title"></span><button class="modal-close"
          id="updateModalClose" type="button" aria-label="" data-i18n-aria-label="common.close">&times;</button></div>
      <div class="modal-body" id="updateBody"></div>
    </div>
  </div>
  <div id="confirmModal" class="modal">
    <div class="modal-content confirm-modal-content">
      <div class="modal-header"><span class="modal-title" id="confirmTitle"></span><button class="modal-close"
          id="confirmClose" type="button" aria-label="" data-i18n-aria-label="common.close">&times;</button></div>
      <div class="modal-body">
        <p class="confirm-message" id="confirmMessage"></p>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="confirmCancel" type="button" data-i18n="common.cancel"></button>
          <button class="btn btn-primary" id="confirmOk" type="button" data-i18n="common.confirm"></button>
        </div>
      </div>
    </div>
  </div>

  <script defer src="/admin/toast.js"></script>
  <script defer src="/admin/app.js"></script>
