# Single compose file used for both local development and Coolify deploys.
#
# Local:
#   docker-compose up -d
#
# Coolify:
#   New Resource -> Docker Compose -> point at this file in the repo.
#   Coolify auto-fills SERVICE_FQDN_KIRO_PROXY and SERVICE_PASSWORD_KIRO_PROXY.

services:
  kiro-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiro-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CONFIG_PATH: ${CONFIG_PATH:-/app/data/config.json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Coolify generates SERVICE_PASSWORD_KIRO_PROXY automatically.
      # Outside Coolify, falls back to ADMIN_PASSWORD env or "changeme".
      ADMIN_PASSWORD: ${SERVICE_PASSWORD_KIRO_PROXY:-${ADMIN_PASSWORD:-changeme}}
      # Coolify magic var: routes the public FQDN to container port 8080.
      # Ignored outside Coolify.
      SERVICE_FQDN_KIRO_PROXY_8080: /
    volumes:
      - kiro-proxy-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  kiro-proxy-data:
